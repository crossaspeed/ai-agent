spring:
  application:
    name: ai-agent
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_agent}?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chat_memory_db}

server:
  port: ${SERVER_PORT:8080}

langchain4j:
  open-ai:
    chat-model:
      base-url: ${CHAT_MODEL_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: ${CHAT_MODEL_NAME:deepseek-chat}
    embedding-model:
      base-url: ${EMBEDDING_BASE_URL:https://aihubmix.com/v1}
      api-key: ${EMBEDDING_API_KEY:}
    streaming-chat-model:
      base-url: ${CHAT_MODEL_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: ${CHAT_MODEL_NAME:deepseek-chat}

pinecone:
  api:
    key: ${PINECONE_API_KEY:}
  index:
    name: ${PINECONE_INDEX_NAME:agent-index}

feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  bot-open-id: ${FEISHU_BOT_OPEN_ID:}
  callback-verification-token: ${FEISHU_CALLBACK_TOKEN:}
  long-connection:
    enabled: ${FEISHU_LONG_CONNECTION_ENABLED:true}
    worker-threads: ${FEISHU_LONG_CONNECTION_WORKER_THREADS:2}

scheduler:
  reminder:
    fixed-delay-ms: ${SCHEDULER_REMINDER_FIXED_DELAY_MS:60000}
