spring:
  application:
    name: ai-agent
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://localhost:3306/ai_agent?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chat_memory_db}
server:
  port: 8080

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
    embedding-model:
      base-url: https://aihubmix.com/v1
      api-key: ${EMBEDDING_API_KEY:}
    streaming-chat-model:
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      base-url: https://api.deepseek.com

pinecone:
  api:
    key: ${PINECONE_API_KEY:}
  index:
    name: agent-index

feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  bot-open-id: ${feishu-bot-open-id:}
  callback-verification-token: ${feishu-callback-token:}
  long-connection:
    enabled: true
    worker-threads: 2

scheduler:
  reminder:
    fixed-delay-ms: 60000



