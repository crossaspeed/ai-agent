name: Sync Labels

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/labels.yml"

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
